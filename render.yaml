services:
  - type: web
    name: mundo-mimitos
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mundo-mimitos-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: mundo-mimitos-db
    plan: free
    postgresVersion: 15
