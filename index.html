<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fff1f2" />
    <meta name="description" content="Mundo Mimitos - Ropa suave y amorosa para bebés y niños" />
    <title>Mundo Mimitos</title>
    <!-- Pre-conexión a los hosts de imágenes externas para acelerar la carga -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <style>
      /* Loader inicial: se ve al instante mientras descarga el JS,
         así no aparece una pantalla en blanco. React lo reemplaza al montar. */
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #f8fafc;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      #app-splash .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #cbd5e1;
        border-top-color: #f43f5e;
        border-radius: 50%;
        animation: app-spin 0.8s linear infinite;
      }
      #app-splash h2 { color: #1e293b; font-size: 18px; font-weight: 600; margin: 0; }
      #app-splash p { color: #94a3b8; font-size: 12px; margin: 0; }
      @keyframes app-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <div class="spinner"></div>
        <h2>Cargando Mundo Mimitos</h2>
        <p>Preparando tejidos y mamelucos suaves...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
